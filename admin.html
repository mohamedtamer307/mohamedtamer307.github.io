
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

</head>

<body>

<h1>Admin Dashboard</h1>

<!-- ========================= -->
<!-- STATS -->
<!-- ========================= -->

<div class="stats">

<div class="card">
<h2 id="messageCount">0</h2>
<p>Messages</p>
</div>

<div class="card">
<h2 id="visitorCount">0</h2>
<p>Visitors</p>
</div>

</div>

<!-- ========================= -->
<!-- MESSAGES -->
<!-- ========================= -->

<h2>Messages</h2>

<table id="messagesTable">

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Message</th>
<th>Delete</th>
</tr>
</thead>

<tbody></tbody>

</table>

<!-- ========================= -->
<!-- VISITORS -->
<!-- ========================= -->

<h2 style="margin-top:50px;">Visitors Analytics</h2>

<div class="table-container">

<table id="visitorsTable">

<thead>

<tr>

<th>ID</th>

<th>IP</th>

<th>Country</th>

<th>City</th>

<th>Device</th>

<th>OS</th>

<th>Browser</th>

<th>Language</th>

<th>Screen</th>

<th>Page</th>

<th>Stay Duration</th>

<th>Entry Time</th>

<th>Exit Time</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script src="admin.js"></script>

</body>

</html>
